services:

  app:
    build: .
    ports:
      - "5000:5000"
    environment:
      DB_HOST: database
      DB_NAME: tasksdb
      DB_USER: devops
      DB_PASSWORD: password
    depends_on:
      - database

  database:
    image: postgres:16
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
      
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data


volumes:
  postgres_data:
