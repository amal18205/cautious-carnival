name: Docker Build

on:
  push:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Télécharger le code
      uses: actions/checkout@v4

    - name: Construire image Docker
      run: docker build -t cautious-carnival-app:latest .

    - name: Scan Docker image with Trivy
      uses: aquasecurity/trivy-action@master
      with:
        image-ref: cautious-carnival-app:latest
        format: table
        severity: HIGH,CRITICAL
